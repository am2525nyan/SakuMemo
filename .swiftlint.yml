# Lintを適用させる対象を指定
included:
    - SakuMemo/
    - SakuMemoPackage/Sources/

# Lint対象から除外するパス
excluded:
    - Package.swift
    - Package.resolved
    - .build/
    - Packages/
    - SakuMemoPackage/Package.swift
    - SakuMemoPackage/.build/
    - "**/checkouts/**"


type_name:
    excluded:
    # クラス名はキャメルケースにする
      - lowerCamelClass


